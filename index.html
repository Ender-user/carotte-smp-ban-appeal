<!DOCTYPE html>
<html>
<head>
  <title>Ban Appeal</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    .admin-btn {
      margin-top: 10px;
      background: #3b82f6;
    }

    h1 {
      text-align: center;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Ban Appeal</h1>

  <input id="mc" placeholder="Pseudo Minecraft">
  <input id="reason" placeholder="Raison du ban">
  <textarea id="msg" placeholder="Explique ton appeal"></textarea>

  <button onclick="send()">Envoyer</button>

  <button class="admin-btn" onclick="goAdmin()">Panel Admin</button>
</div>

<script src="app.js"></script>

<script>
function goAdmin() {
  window.location.href = "admin.html";
}
</script>

</body>
</html>
