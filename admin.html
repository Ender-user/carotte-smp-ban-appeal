<h1>Connexion Admin</h1>

<button onclick="login()">Se connecter avec Discord</button>

<script>
const CLIENT_ID = "1431610110412722206";
const REDIRECT_URI = "https://ender-user.github.io/carotte-smp-ban-appeal/panel.html";

function login() {
  const url = "https://discord.com/api/oauth2/authorize?client_id=" 
    + CLIENT_ID +
